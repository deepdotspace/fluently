name = "fluently"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]
main = "worker.ts"

[assets]
directory = "dist"
binding = "ASSETS"
not_found_handling = "single-page-application"
run_worker_first = ["/api/*", "/ws/*", "/internal/*", "/v1/*"]

[[migrations]]
tag = "v1"
new_sqlite_classes = ["RecordRoom", "YjsRoom", "CanvasRoom", "PresenceRoom"]

[[migrations]]
tag = "v2"
new_sqlite_classes = ["CronRoom"]

[durable_objects]
bindings = [
  { name = "RECORD_ROOMS", class_name = "RecordRoom" },
  { name = "YJS_ROOMS", class_name = "YjsRoom" },
  { name = "CANVAS_ROOMS", class_name = "CanvasRoom" },
  { name = "PRESENCE_ROOMS", class_name = "PresenceRoom" },
  { name = "CRON_ROOMS", class_name = "CronRoom" },
]

[vars]
DEEPSPACE_APP_ID = "fluently"
APP_NAME = "fluently"

[dev]
port = 8780
inspector_port = 9237

# Secrets (set via `wrangler secret put` or written by `deepspace dev`):
#   AUTH_JWT_PUBLIC_KEY
#   AUTH_JWT_ISSUER
#   AUTH_WORKER_URL
#   OWNER_USER_ID
