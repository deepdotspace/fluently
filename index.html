<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0a0a0f" />

    <title>Fluently: Anki, reimagined</title>
    <meta
      name="description"
      content="Anki, reimagined. Smart flashcards with AI-generated cards and beautiful design."
    />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg?v=2" />

    <!-- Clash Display: the landing's display face. Preloaded so the hero type
         lands without a flash. Only used by the signed-out landing. -->
    <link
      rel="preload"
      href="/fonts/ClashDisplay-Variable.woff2"
      as="font"
      type="font/woff2"
      crossorigin
    />

    <!-- Open Graph (Facebook, Reddit, LinkedIn, Discord, iMessage) -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Fluently" />
    <meta property="og:title" content="Fluently: Anki, reimagined" />
    <meta
      property="og:description"
      content="Anki, reimagined. Smart flashcards with AI-generated cards and beautiful design."
    />
    <meta property="og:url" content="https://fluently.app.space" />
    <meta property="og:image" content="https://fluently.app.space/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="Fluently: Anki, reimagined" />

    <!-- Twitter / X Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Fluently: Anki, reimagined" />
    <meta
      name="twitter:description"
      content="Anki, reimagined. Smart flashcards with AI-generated cards and beautiful design."
    />
    <meta name="twitter:image" content="https://fluently.app.space/og-image.png" />
    <meta name="twitter:image:alt" content="Fluently: Anki, reimagined" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
